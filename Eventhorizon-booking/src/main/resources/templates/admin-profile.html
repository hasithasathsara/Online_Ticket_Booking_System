<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca'}}}}}</script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen p-6 md:p-12 flex items-center justify-center">
<div class="w-full max-w-2xl pro-card p-8">
    <div class="flex items-center gap-3 mb-6 border-b border-slate-100 dark:border-slate-800 pb-5">
        <div class="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center text-primary-700 font-bold text-lg">
            <span th:text="${#strings.substring(admin.name, 0, 1)}">A</span>
        </div>
        <div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white">My Profile</h2>
            <p class="text-sm text-slate-500" th:text="${admin.adminLevel} + ' Access'">Role</p>
        </div>
    </div>

    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-xl text-sm font-medium mb-6" th:text="${success}"></div>

    <form th:action="@{/admin/profile/update}" method="post" class="space-y-5">
        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Full Name</label>
            <input type="text" name="name" th:value="${admin.name}" class="pro-input" required>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email Address (Read-only)</label>
            <input type="email" th:value="${admin.email}" class="pro-input bg-slate-100 text-slate-500 cursor-not-allowed" readonly>
            <p class="text-xs text-slate-400 mt-1">Contact Super Admin to change your email address.</p>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">New Password</label>
            <input type="password" name="password" class="pro-input" placeholder="Leave blank to keep current password">
        </div>

        <div class="pt-4 flex flex-col sm:flex-row gap-3">
            <button type="submit" class="btn-primary px-8 py-3">Update Profile</button>
            <a href="/admin" class="btn-secondary px-8 py-3 flex items-center justify-center">Back to Dashboard</a>
        </div>
    </form>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
