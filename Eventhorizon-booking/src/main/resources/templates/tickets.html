<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — EventHorizon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca'}}}}}</script>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="bg-slate-50 dark:bg-slate-950">

<nav class="nav-glass sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-500 to-purple-600 flex items-center justify-center">
        <i data-lucide="zap" class="w-5 h-5 text-white"></i>
      </div>
      <span class="font-bold text-xl text-slate-900 dark:text-white">EventHorizon</span>
    </a>
    <div class="hidden md:flex items-center gap-6">
      <a href="/" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary-600">Home</a>
      <a href="/events" class="text-sm font-semibold text-primary-600">Events</a>
      <a href="/bookings" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary-600">My Bookings</a>
      <a href="/tickets" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary-600">My Tickets</a>
      <a href="/reviews" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary-600">Reviews</a>
    </div>

    <div class="flex items-center gap-4">
      <th:block th:if="${session.loggedInAdmin != null}">
        <span class="text-sm font-bold text-red-500"> Admin View</span>
        <a href="/admin" class="btn-primary text-sm py-2 px-4">Back to Dashboard</a>
      </th:block>

      <th:block th:if="${session.loggedInUser != null}">
        <a href="/users/profile" class="flex items-center gap-2 hover:opacity-80">
          <div class="w-9 h-9 rounded-full bg-primary-600 flex items-center justify-center text-white font-bold text-sm">
            <span th:text="${#strings.substring(session.loggedInUser.name, 0, 1)}">U</span>
          </div>
          <span class="text-sm font-semibold text-slate-700 dark:text-slate-300" th:text="${session.loggedInUser.name}">User</span>
        </a>
        <a href="/users/logout" class="btn-secondary text-sm py-2 px-4">Sign Out</a>
      </th:block>

      <th:block th:if="${session.loggedInUser == null and session.loggedInAdmin == null}">
        <a href="/admin/login" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary-600">Admin</a>
        <a href="/users/login" class="btn-primary text-sm py-2.5 px-5">Sign In</a>
      </th:block>
    </div>
  </div>
</nav>

<div class="relative overflow-hidden bg-[#1e1b4b] py-20 px-6">

  <div class="absolute inset-0 opacity-50">
    <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-indigo-500 blur-[120px]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-primary-600 blur-[120px]"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <div class="flex flex-col items-center text-center">

      <div class="inline-flex items-center gap-2 bg-white/10 border border-white/20 px-4 py-1.5 rounded-full text-[10px] font-black text-primary-200 mb-6 backdrop-blur-md uppercase tracking-[0.2em]">
        Explore Events
      </div>

      <h1 class="text-4xl md:text-6xl font-black text-white mb-6 tracking-tight">
        Browse <span class="text-primary-300">Events</span>
      </h1>

      <form th:action="@{/events}" method="get" class="w-full max-w-2xl group mb-10">
        <div class="relative flex items-center bg-white/10 backdrop-blur-2xl rounded-2xl border border-white/20 p-1.5 shadow-2xl transition-all group-focus-within:bg-white/15 group-focus-within:border-white/30">
          <div class="flex-1 flex items-center px-4">
            <i data-lucide="search" class="w-5 h-5 text-white/50"></i>
            <input type="text" name="search" th:value="${search}"
                   placeholder="What are you looking for?"
                   class="w-full bg-transparent border-none text-white placeholder:text-white/40 py-3.5 px-3 focus:ring-0 text-base font-medium">
          </div>
          <button type="submit" class="bg-white text-primary-700 font-black px-8 py-3 rounded-xl transition-all hover:bg-primary-50 active:scale-95 shadow-xl">
            Search
          </button>
        </div>
      </form>

      <div class="flex flex-wrap gap-2 justify-center">
        <a href="/events" class="px-6 py-2 rounded-xl text-xs font-black transition-all border border-white/10"
           th:classappend="${param.category == null ? 'bg-white text-primary-700 shadow-lg' : 'bg-white/5 text-white hover:bg-white/10'}">
          ALL
        </a>

        <a th:each="cat : ${ {'Music', 'Sports', 'Technology', 'Arts', 'Food'} }"
           th:href="@{/events(category=${cat})}"
           class="px-6 py-2 rounded-xl text-xs font-black transition-all border border-white/10"
           th:classappend="${#strings.equals(param.category, cat) ? 'bg-primary-500 text-white shadow-lg border-primary-400' : 'bg-white/5 text-white hover:bg-white/10'}">
          <span th:text="${cat == 'Music' ? '🎵 Music' : (cat == 'Sports' ? '🏅 Sports' : (cat == 'Technology' ? '💻 Tech' : (cat == 'Arts' ? '🎨 Arts' : '🍕 Food')))}"></span>
        </a>
      </div>
    </div>
  </div>
</div>

<div class="max-w-7xl mx-auto px-6 py-16">
  <div th:if="${#lists.isEmpty(events)}" class="text-center py-24 bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 shadow-sm">
    <i data-lucide="calendar-x" class="w-16 h-16 text-slate-300 mx-auto mb-4"></i>
    <h3 class="text-xl font-bold text-slate-800 dark:text-white">No events found</h3>
    <a href="/events" class="text-primary-600 font-bold mt-4 inline-block underline">Clear filters</a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div th:each="event : ${events}" class="group bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-2xl transition-all duration-500 rounded-[32px] overflow-hidden">
      <div class="h-60 relative overflow-hidden">
        <img th:if="${event.imageUrl != null and !event.imageUrl.isEmpty()}" th:src="${event.imageUrl}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
        <div class="absolute bottom-4 right-4 bg-slate-900/80 backdrop-blur-md rounded-xl px-4 py-1.5 border border-white/10">
          <span class="text-white font-black text-lg" th:text="'Rs. ' + ${event.price}">Rs. 0</span>
        </div>
      </div>
      <div class="p-6">
        <h3 class="font-black text-xl text-slate-900 dark:text-white mb-4 line-clamp-1" th:text="${event.title}">Event Title</h3>
        <div class="space-y-3 mb-6 text-slate-500 font-medium text-sm">
          <div class="flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4 text-primary-500"></i><span th:text="${event.venue}">Venue</span></div>
          <div class="flex items-center gap-2"><i data-lucide="ticket" class="w-4 h-4 text-green-500"></i><span th:text="${event.availableTickets} + ' left'">Tickets</span></div>
        </div>
        <form th:action="@{/bookings/checkout}" method="post" class="flex gap-2" th:if="${event.availableTickets > 0}">
          <input type="hidden" name="eventId" th:value="${event.id}">
          <input type="number" name="quantity" value="1" min="1" class="w-20 bg-slate-50 dark:bg-slate-800 rounded-xl text-center font-bold">
          <button type="submit" class="btn-primary flex-1 py-3 text-sm font-black shadow-lg">Book Now</button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer class="bg-slate-950 text-white py-12 px-6 text-center border-t border-slate-900">
  <p class="text-slate-500 text-sm font-medium">© 2026 EventHorizon — SE1020 OOP Group Project</p>
</footer>

<script>lucide.createIcons();</script>
</body>
</html>
