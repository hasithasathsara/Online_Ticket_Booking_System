<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit User — Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center py-12 px-6">

<div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
  <h2 class="text-2xl font-bold text-slate-900 mb-2">Edit User Profile</h2>
  <p class="text-sm text-slate-500 mb-8">Update the account information for this user.</p>

  <form th:action="@{/users/admin-update}" method="post" class="space-y-5">
    <input type="hidden" name="id" th:value="${user.id}">

    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
      <input type="text" name="name" th:value="${user.name}" required
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Mobile Number</label>
      <input type="text" name="phoneNumber" th:value="${user.phoneNumber}" required
             placeholder="07XXXXXXXX"
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
      <input type="email" name="email" th:value="${user.email}" required
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
    </div>

    <div class="flex gap-3 pt-4">
      <a href="/admin" class="flex-1 px-6 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 text-center hover:bg-slate-200 transition-colors">
        Cancel
      </a>
      <button type="submit" class="flex-1 px-6 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-md transition-all">
        Save Changes
      </button>
    </div>
  </form>
</div>

</body>
</html>
