<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — EventHorizon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca'}}}}}</script>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-primary-50 dark:from-slate-900 dark:to-slate-800 px-4 py-12">

<div class="w-full max-w-md">

  <div class="text-center mb-8">
    <a href="/" class="inline-flex items-center gap-2">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-purple-600 flex items-center justify-center">
        <i data-lucide="zap" class="w-6 h-6 text-white"></i>
      </div>
      <span class="font-bold text-2xl text-slate-900 dark:text-white">EventHorizon</span>
    </a>
  </div>

  <div class="flex bg-slate-100 dark:bg-slate-800 rounded-2xl p-1 mb-6">
    <button onclick="showTab('login')" id="loginTab" class="flex-1 py-3 rounded-xl text-sm font-semibold transition-all bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm">
      Sign In
    </button>
    <button onclick="showTab('register')" id="registerTab" class="flex-1 py-3 rounded-xl text-sm font-semibold transition-all text-slate-500">
      Create Account
    </button>
  </div>

  <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-xl text-sm font-medium mb-4" th:text="${success}"></div>
  <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-xl text-sm font-medium mb-4" th:text="${error}"></div>

  <div id="loginForm" class="pro-card p-8">
    <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Welcome back!</h2>
    <p class="text-slate-500 text-sm mb-6">Sign in to your EventHorizon account</p>

    <form th:action="${loginAction != null ? loginAction : '/users/login'}" method="post">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com" class="pro-input">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
          <input type="password" name="password" required placeholder="Enter your password" class="pro-input">
        </div>
      </div>
      <button type="submit" class="btn-primary w-full mt-6 py-3.5 text-base">
        Sign In to EventHorizon
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-slate-500">Are you an admin?
        <a href="/admin/login" class="text-primary-600 font-semibold hover:underline">Admin Login</a>
      </p>
    </div>
  </div>

  <div id="registerForm" class="pro-card p-8 hidden">
    <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Create account</h2>
    <p class="text-slate-500 text-sm mb-6">Join thousands of event lovers</p>

    <form th:action="@{/users/register}" method="post">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Full Name</label>
          <input type="text" name="name" required placeholder="John Doe" class="pro-input">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com" class="pro-input">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
          <input type="password" name="password" required placeholder="Min 6 characters" class="pro-input" minlength="6">
        </div>
      </div>
      <button type="submit" class="btn-primary w-full mt-6 py-3.5 text-base">
        Create My Account
      </button>
    </form>
  </div>

  <div class="text-center mt-6">
    <a href="/" class="text-sm text-slate-500 hover:text-primary-600">← Back to home</a>
  </div>
</div>

<script>
  lucide.createIcons();
  function showTab(tab) {
    const loginForm    = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTab     = document.getElementById('loginTab');
    const registerTab  = document.getElementById('registerTab');
    if (tab === 'login') {
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
      loginTab.classList.add('bg-white','dark:bg-slate-700','text-slate-900','shadow-sm');
      loginTab.classList.remove('text-slate-500');
      registerTab.classList.remove('bg-white','dark:bg-slate-700','text-slate-900','shadow-sm');
      registerTab.classList.add('text-slate-500');
    } else {
      registerForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
      registerTab.classList.add('bg-white','dark:bg-slate-700','text-slate-900','shadow-sm');
      registerTab.classList.remove('text-slate-500');
      loginTab.classList.remove('bg-white','dark:bg-slate-700','text-slate-900','shadow-sm');
      loginTab.classList.add('text-slate-500');
    }
  }
  if (window.location.hash === '#register') showTab('register');
</script>
</body>
</html>
