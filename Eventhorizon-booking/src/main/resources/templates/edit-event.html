<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Event — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca'}}}}}</script>
    <style>
        /* Image Preview Animation */
        .img-preview-box {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 0.75rem;
            border: 2px dashed #cbd5e1;
            margin-top: 0.5rem;
            background: #f8fafc;
        }
        .img-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease-in-out;
        }
        .img-preview-box:hover img {
            transform: scale(1.15);
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 p-10 min-h-screen flex items-center justify-center">
<div class="w-full max-w-3xl pro-card p-8">
    <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Edit Event Details</h2>
        <span class="badge badge-active text-sm">Admin Portal</span>
    </div>

    <form th:action="@{/events/admin-update}" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <input type="hidden" name="id" th:value="${event.id}">

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Event Title</label>
            <input type="text" name="title" th:value="${event.title}" required class="pro-input">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Category</label>
            <select name="category" class="pro-input">
                <option th:selected="${event.category == 'Music'}" value="Music">🎵 Music</option>
                <option th:selected="${event.category == 'Sports'}" value="Sports">🏅 Sports</option>
                <option th:selected="${event.category == 'Technology'}" value="Technology">💻 Technology</option>
                <option th:selected="${event.category == 'Arts'}" value="Arts">🎨 Arts</option>
                <option th:selected="${event.category == 'Food'}" value="Food">🍕 Food</option>
                <option th:selected="${event.category == 'Business'}" value="Business">💼 Business</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Venue</label>
            <input type="text" name="venue" th:value="${event.venue}" required class="pro-input">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Total Tickets</label>
            <input type="number" name="totalTickets" th:value="${event.totalTickets}" required min="1" class="pro-input">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Available Tickets</label>
            <input type="number" name="availableTickets" th:value="${event.availableTickets}" required min="0" class="pro-input">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Price (Rs)</label>
            <input type="number" step="0.01" name="price" th:value="${event.price}" required min="0" class="pro-input">
        </div>

        <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Image URL (Optional)</label>
            <input type="url" name="imageUrl" th:value="${event.imageUrl}" class="pro-input" placeholder="https://..."
                   oninput="
                     if(this.value.startsWith('data:image')) {
                       alert('Please upload  http:// or  https://  Image Link ');
                       this.value = '';
                     }
                     document.getElementById('editImgPreview').src = this.value || 'https://placehold.co/600x400?text=Event+Image'">

            <div class="img-preview-box">
                <img id="editImgPreview"
                     th:src="${event.imageUrl != null and !event.imageUrl.isEmpty() ? event.imageUrl : 'https://placehold.co/600x400?text=Event+Image'}"
                     alt="Event Preview">
            </div>
        </div>

        <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Description</label>
            <textarea name="description" rows="4" required class="pro-input resize-none" th:text="${event.description}"></textarea>
        </div>

        <div class="md:col-span-2 flex gap-3 mt-2">
            <button type="submit" class="btn-primary px-8 py-3">Save Changes</button>
            <a href="/admin" class="btn-secondary px-8 py-3 flex items-center justify-center">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
